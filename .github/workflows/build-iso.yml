name: Build ISO

on:
  pull_request:

jobs:
  validate:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck build script
        run: shellcheck -s bash build-iso.sh build-interactive.sh flash-efi.sh
      - name: Validate scripts are executable
        run: test -x build-iso.sh && test -x build-interactive.sh && test -x flash-efi.sh

  build:
    name: Build ISO (${{ matrix.os }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xorriso p7zip-full wget openssl

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install xorriso p7zip wget openssl

      - name: Extract Ubuntu version for cache key
        id: vars
        run: |
          version=$(grep -oP 'UBUNTU_VERSION="\$\{UBUNTU_VERSION:-\K[^"]+(?="\})' build-iso.sh 2>/dev/null \
            || grep 'UBUNTU_VERSION=' build-iso.sh | head -1 | sed 's/.*:-//;s/["}].*//')
          echo "ubuntu_version=${version}" >> "$GITHUB_OUTPUT"
          echo "iso_file=ubuntu-${version}-live-server-amd64.iso" >> "$GITHUB_OUTPUT"

      - name: Cache Ubuntu ISO
        uses: actions/cache@v4
        with:
          path: ${{ steps.vars.outputs.iso_file }}
          key: ubuntu-iso-${{ steps.vars.outputs.ubuntu_version }}

      - name: Build ISO
        run: bash build-iso.sh

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: macbook-k8s-iso-${{ matrix.os }}
          path: ubuntu-*-macbook-k8s.iso
          retention-days: 7

  test-install:
    name: Test install (QEMU)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Download built ISO
        uses: actions/download-artifact@v4
        with:
          name: macbook-k8s-iso-ubuntu-latest

      - name: Install QEMU and OVMF
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf qemu-utils

      - name: Enable KVM
        run: |
          # GitHub Actions ubuntu runners support KVM
          if [[ -e /dev/kvm ]]; then
            sudo chmod 666 /dev/kvm
            echo "QEMU_KVM_FLAGS=-enable-kvm -cpu host" >> "$GITHUB_ENV"
            echo "QEMU_TIMEOUT=1200" >> "$GITHUB_ENV"
            echo "KVM is available (timeout: 1200s)"
          else
            echo "QEMU_KVM_FLAGS=-cpu qemu64" >> "$GITHUB_ENV"
            echo "QEMU_TIMEOUT=2400" >> "$GITHUB_ENV"
            echo "WARNING: KVM not available, install will be slow (timeout: 2400s)"
          fi

      - name: Prepare VM disk and EFI vars
        run: |
          # Create 20GB virtual disk for installation
          qemu-img create -f qcow2 disk.qcow2 20G

          # Copy OVMF vars (writable) — code is read-only
          cp /usr/share/OVMF/OVMF_CODE_4M.fd ovmf_code.fd
          cp /usr/share/OVMF/OVMF_VARS_4M.fd ovmf_vars.fd

      - name: Find ISO
        id: iso
        run: |
          iso=$(ls ubuntu-*-macbook-k8s.iso | head -1)
          echo "iso_file=${iso}" >> "$GITHUB_OUTPUT"
          echo "Found ISO: ${iso}"

      - name: Run autoinstall in QEMU
        run: |
          echo "=== Starting QEMU autoinstall ==="
          echo "ISO: ${{ steps.iso.outputs.iso_file }}"
          echo "KVM flags: $QEMU_KVM_FLAGS | Timeout: ${QEMU_TIMEOUT}s"

          # Boot the ISO in QEMU with UEFI, 4GB RAM, 2 CPUs, NAT networking
          # Virtio-serial exposes hvc0 console inside the VM, captured on stdio
          # (hvc0 only exists in QEMU — real hardware is unaffected)
          # The installer will auto-reboot when done; -no-reboot makes QEMU exit instead
          timeout "$QEMU_TIMEOUT" qemu-system-x86_64 \
            -machine q35 \
            $QEMU_KVM_FLAGS \
            -smp 2 \
            -m 4096 \
            -drive if=pflash,format=raw,readonly=on,file=ovmf_code.fd \
            -drive if=pflash,format=raw,file=ovmf_vars.fd \
            -drive file=disk.qcow2,format=qcow2,if=virtio \
            -cdrom "${{ steps.iso.outputs.iso_file }}" \
            -boot d \
            -netdev user,id=net0 \
            -device virtio-net-pci,netdev=net0 \
            -display none \
            -serial none \
            -monitor none \
            -device virtio-serial-pci \
            -chardev stdio,id=hvc0,signal=off \
            -device virtconsole,chardev=hvc0 \
            -no-reboot \
            2>&1 | tee install.log &

          QEMU_PID=$!

          # Monitor for completion or failure
          # The installer will trigger a reboot, and -no-reboot makes QEMU exit
          SECONDS=0
          while kill -0 $QEMU_PID 2>/dev/null; do
            if [[ $SECONDS -ge $QEMU_TIMEOUT ]]; then
              echo "ERROR: Install timed out after ${QEMU_TIMEOUT}s"
              kill $QEMU_PID 2>/dev/null || true
              exit 1
            fi

            # Check for known failure patterns in the log
            if grep -qE "Installation failed|An error occurred|CRITICAL" install.log 2>/dev/null; then
              echo "ERROR: Installer reported an error"
              echo "=== Last 50 lines of install log ==="
              tail -50 install.log
              kill $QEMU_PID 2>/dev/null || true
              exit 1
            fi

            sleep 15
            echo "... install running (${SECONDS}s elapsed)"
          done

          wait $QEMU_PID || true
          echo "=== QEMU exited after ${SECONDS}s ==="

          # Check if installation was successful
          # If QEMU exited cleanly, the installer rebooted (success)
          if grep -qE "Rebooting|reboot: Restarting system|reboot: Power down|Finished install" install.log; then
            echo "SUCCESS: Installer completed and triggered reboot"
          else
            echo "WARNING: QEMU exited but no reboot detected in log"
            echo "=== Last 50 lines ==="
            tail -50 install.log
          fi

      - name: Boot installed system and verify
        run: |
          echo "=== Booting installed system ==="

          # Boot from the installed disk (no CD-ROM)
          # The installed system has no console=hvc0 (bare-metal only), so no
          # kernel output is captured. Instead we verify the system booted by
          # checking QEMU stays alive: -no-reboot makes QEMU exit on kernel
          # panic/reboot, so a running VM after 90s means successful boot.
          timeout 300 qemu-system-x86_64 \
            -machine q35 \
            $QEMU_KVM_FLAGS \
            -smp 2 \
            -m 4096 \
            -drive if=pflash,format=raw,readonly=on,file=ovmf_code.fd \
            -drive if=pflash,format=raw,file=ovmf_vars.fd \
            -drive file=disk.qcow2,format=qcow2,if=virtio \
            -netdev user,id=net0 \
            -device virtio-net-pci,netdev=net0 \
            -display none \
            -serial none \
            -monitor none \
            -no-reboot &

          QEMU_PID=$!

          # If QEMU is still running after 90s, the system booted successfully.
          # A kernel panic would trigger a reboot, and -no-reboot makes QEMU exit.
          SECONDS=0
          while kill -0 $QEMU_PID 2>/dev/null; do
            if [[ $SECONDS -ge 90 ]]; then
              echo "SUCCESS: System still running after ${SECONDS}s (boot verified)"
              kill $QEMU_PID 2>/dev/null || true
              break
            fi
            sleep 5
            echo "... boot check (${SECONDS}s elapsed)"
          done

          # If QEMU exited before 90s, it's a failure
          if ! kill -0 $QEMU_PID 2>/dev/null && [[ $SECONDS -lt 90 ]]; then
            echo "ERROR: QEMU exited after only ${SECONDS}s (likely kernel panic)"
            exit 1
          fi

          wait $QEMU_PID 2>/dev/null || true
          echo "=== Boot verification complete ==="

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: install-logs
          path: install.log
          retention-days: 7
